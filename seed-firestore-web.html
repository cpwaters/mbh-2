    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const timestamp = new Date().toLocaleTimeString();
      const className = type;
      logDiv.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
      console.log(message);
    }

    // Auth state observer
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('userSection').classList.remove('hidden');
        document.getElementById('actionButtons').classList.remove('hidden');
        document.getElementById('userEmail').textContent = user.email;
        log(`✅ Signed in as ${user.email}`, 'success');
      } else {
        document.getElementById('loginSection').classList.remove('hidden');
        document.getElementById('userSection').classList.add('hidden');
        document.getElementById('actionButtons').classList.add('hidden');
      }
    });

    window.signIn = async function() {
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;

      if (!email || !password) {
        log('❌ Please enter email and password', 'error');
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
        log('✅ Sign in successful', 'success');
      } catch (error) {
        log(`❌ Sign in failed: ${error.message}`, 'error');
      }
    };

    window.signInWithGoogle = async function() {

    };

    window.clearAllData = async function() {
      if (!auth.currentUser) {
        log('❌ Please sign in first', 'error');
        return;
      }

      const btn = document.getElementById('clearBtn');
      btn.disabled = true;

      try {
        log('🗑️ Starting to clear all collections...', 'info');

        const collections = ['loads', 'activeLoads', 'userProfiles', 'vehicles'];

        for (const collectionName of collections) {
          const snapshot = await getDocs(collection(db, collectionName));
          if (!snapshot.empty) {
            const batch = writeBatch(db);
            let count = 0;
            snapshot.docs.forEach((docSnapshot) => {
              batch.delete(docSnapshot.ref);
              count++;
            });
            await batch.commit();
            log(`✓ Cleared ${count} documents from ${collectionName}`, 'success');
          } else {
            log(`Collection ${collectionName} is already empty`, 'info');
          }
        }

        log('✅ All collections cleared successfully!', 'success');
      } catch (error) {

      } finally {

      const btn = document.getElementById('seedBtn');
      btn.disabled = true;

      try {

        // Update loads with current user ID

          ...load,
          createdBy: auth.currentUser.uid

        // Update activeLoads with current user ID

          ...activeLoad,
          userId: auth.currentUser.uid
        }));

        // Add loads

          const docId = `LOAD-${String(i + 1).padStart(3, '0')}`;

        }
        log(`✓ Added ${loadsWithUserId.length} loads`, 'success');

        // Add active loads
        log('Adding active loads...', 'info');
        for (const activeLoad of activeLoadsWithUserId) {
          await setDoc(doc(db, 'activeLoads', activeLoad.active_load_id), activeLoad);
        }
        log(`✓ Added ${activeLoadsWithUserId.length} active loads`, 'success');

        // Add user profiles
        log('Adding user profiles...', 'info');
        for (const profile of userProfiles) {
          await setDoc(doc(db, 'userProfiles', profile.user_id), profile);
        }
        log(`✓ Added ${userProfiles.length} user profiles`, 'success');

        // Add vehicles

          await setDoc(doc(db, 'vehicles', docId), vehicles[i]);
        }
        log(`✓ Added ${vehicles.length} vehicles`, 'success');

        log('✅ Firestore seeding completed successfully!', 'success');
        log(`📊 Summary:`, 'info');
        log(`  - loads: ${loadsWithUserId.length} documents`, 'info');

        log(`  - userProfiles: ${userProfiles.length} documents`, 'info');
        log(`  - vehicles: ${vehicles.length} documents`, 'info');

        console.error(error);
      } finally {
        btn.disabled = false;
